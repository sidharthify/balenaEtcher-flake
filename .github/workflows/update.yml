name: Update balenaEtcher

on:
  schedule:
    - cron: "0 9 * * 1"
  workflow_dispatch:
    inputs:
      version:
        description: ""
        required: false
        default: ""

permissions:
  contents: write

jobs:
  update:
    name: Bump balena-etcher version
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v27
        with:
          nix_path: nixpkgs=channel:nixos-unstable
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Fetch latest release version
        id: upstream
        run: |
          if [[ -n "${{ github.event.inputs.version }}" ]]; then
            echo "version=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            ver=$(curl -fsSL \
              "https://api.github.com/repos/balena-io/etcher/releases/latest" \
              | grep '"tag_name"' \
              | sed -E 's/.*"v([^"]+)".*/\1/')
            echo "version=${ver}" >> "$GITHUB_OUTPUT"
          fi

      - name: Compare with current version
        id: compare
        run: |
          current=$(grep '^  version = ' pkgs/balena-etcher/default.nix \
                    | sed -E 's/.*"(.+)".*/\1/')
          new="${{ steps.upstream.outputs.version }}"
          echo "current=${current}" >> "$GITHUB_OUTPUT"
          echo "new=${new}"         >> "$GITHUB_OUTPUT"
          if [[ "$current" == "$new" ]]; then
            echo "needs_update=false" >> "$GITHUB_OUTPUT"
          else
            echo "needs_update=true"  >> "$GITHUB_OUTPUT"
          fi

      - name: Compute new .deb hash
        if: steps.compare.outputs.needs_update == 'true'
        id: hash
        run: |
          new="${{ steps.compare.outputs.new }}"
          url="https://github.com/balena-io/etcher/releases/download/v${new}/balena-etcher_${new}_amd64.deb"
          hex=$(nix-prefetch-url --type sha256 "$url" 2>/dev/null)
          b64=$(echo "$hex" | xxd -r -p | base64 | tr -d '\n')
          echo "hash=sha256-${b64}" >> "$GITHUB_OUTPUT"

      - name: Patch derivation
        if: steps.compare.outputs.needs_update == 'true'
        run: |
          current="${{ steps.compare.outputs.current }}"
          new="${{ steps.compare.outputs.new }}"
          hash="${{ steps.hash.outputs.hash }}"

          sed -i \
            -e "s|version = \"${current}\";|version = \"${new}\";|" \
            -e "s|sha256  = \"sha256-[^\"]*\";|sha256  = \"${hash}\";|" \
            pkgs/balena-etcher/default.nix

      - name: Commit and push
        if: steps.compare.outputs.needs_update == 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add pkgs/balena-etcher/default.nix
          git commit -m "balena-etcher: ${{ steps.compare.outputs.current }} -> ${{ steps.compare.outputs.new }}"
          git push
